<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/game.css">
    <title>cool game</title>
</head>
<body>
<!--TODO рефактор: вынести в отдельный класс экраны-->
    <div id="game-wrapper">
        <div id="game-container">
            <div id="menu">
                <h1>Поиск предметов</h1>
                <button id="menu-button">Играть</button>
            </div>
            <div id="tutorial" style="display: none">
                <h1>Инструкция</h1>
                <button id="next-button">Дальше</button>
            </div>
            <div id="playing" style="display: none">
                <button id="pause-button">Пауза</button>
                <div id="game-field"></div>
                <div id="items-bar"></div>
            </div>
            <div id="paused" style="display: none">
                <div id="paused-modal">
                    <h1>Пауза</h1>
                    <button id="back-to-game-button">Обратно к игре</button>
                    <button class="restart-button">Заново</button>
                </div>
            </div>
            <div id="win" style="display: none">
                <h1>Победа!</h1>
                <button class="restart-button">Заново</button>
                <button id="back-to-menu-button">В меню</button>
            </div>
        </div>
    </div>


    <script src="js/game.js"></script>
</body>
</html>
